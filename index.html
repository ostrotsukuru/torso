<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Torso Deformation - Shareable State</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 15px; width: 100%;
            text-align: center; font-family: 'Malgun Gothic', sans-serif;
            pointer-events: none;
        }
        .mode-btn {
            pointer-events: auto;
            padding: 10px 20px; margin: 0 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            border: 2px solid #fff; border-radius: 8px;
            background-color: rgba(255,255,255,0.2); color: white; transition: 0.2s;
        }
        .active-btn {
            background-color: #00bcd4; border-color: #00bcd4; color: #000;
        }
        .share-btn {
            background-color: #ffeb3b; border-color: #ffeb3b; color: #000;
        }
        #info-panel {
            position: absolute; bottom: 20px; left: 20px;
            font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.7); color: #eee;
            padding: 12px; border-radius: 6px; pointer-events: none;
            line-height: 1.6;
        }
        /* 알림 메시지 스타일 */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #4CAF50; color: #fff;
            text-align: center; border-radius: 4px; padding: 16px; position: absolute;
            z-index: 1; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 16px;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div id="ui-container">
        <button id="btn-camera" class="mode-btn active-btn">🎥 카메라 회전</button>
        <button id="btn-deform" class="mode-btn">✜ 3D 관절 조작</button>
        <button id="btn-share" class="mode-btn share-btn">🔗 현재 상태 링크 복사</button>
    </div>
    <div id="info-panel">
        <div style="font-weight: bold; margin-bottom: 5px; color: #00bcd4;">[ Shareable Rigid Torso ]</div>
        <div>형태를 변형한 후 <span style="color: #ffeb3b;">[링크 복사]</span> 버튼을 누르세요.</div>
        <div>복사된 URL을 주소창에 붙여넣으면 형태가 복원됩니다!</div>
    </div>
    <div id="toast">✅ 상태 링크가 클립보드에 복사되었습니다!</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(120, 80, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);

        const light1 = new THREE.DirectionalLight(0xffffff, 1.0); light1.position.set(100, 100, 100); scene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffffff, 0.8); light2.position.set(-100, -50, -100); scene.add(light2);
        scene.add(new THREE.AmbientLight(0x404040));
        scene.add(new THREE.GridHelper(200, 20, 0x444444, 0x222222));

        // --- 1. 원본 메쉬 ---
        const ORIG_WIDTH = 50, ORIG_HEIGHT = 100, ORIG_DEPTH = 25;
        const geometry = new THREE.BoxGeometry(ORIG_WIDTH, ORIG_HEIGHT, ORIG_DEPTH, 20, 50, 10);
        
        const material = new THREE.MeshPhysicalMaterial({ 
            color: 0x00bcd4, 
            metalness: 0.1, roughness: 0.2, transmission: 0.7, 
            thickness: 1.0, clearcoat: 1.0, clearcoatRoughness: 0.1,
            transparent: true, opacity: 0.8, wireframe: false
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const posAttribute = geometry.attributes.position;
        const basePositions = new Float32Array(posAttribute.array);

        // --- 2. 축 및 데이터 구조 ---
        const halfWidth = ORIG_WIDTH / 2;
        const halfDepth = ORIG_DEPTH / 2;
        const halfHeight = ORIG_HEIGHT / 2;

        const spineDefs = [
            { id: 'center', x: 0, z: 0, color: 0xffeb3b }, 
            { id: 'fl', x: -halfWidth, z: halfDepth, color: 0xff1744 },
            { id: 'fr', x: halfWidth, z: halfDepth, color: 0x00e676 },
            { id: 'bl', x: -halfWidth, z: -halfDepth, color: 0x2979ff },
            { id: 'br', x: halfWidth, z: -halfDepth, color: 0xd500f9 }
        ];

        const segmentCount = 5; 
        const allControlSpheres = [];
        const curves = [];
        const curveLines = [];
        const levelQuaternions = Array(segmentCount + 1).fill().map(() => new THREE.Quaternion());

        spineDefs.forEach((def, spineIndex) => {
            const points = [];
            const sphereGeo = new THREE.SphereGeometry(2.5, 16, 16); 
            const sphereMat = new THREE.MeshBasicMaterial({ color: def.color, depthTest: false });

            for (let i = 0; i <= segmentCount; i++) {
                const yPos = -halfHeight + (i / segmentCount) * ORIG_HEIGHT;
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                sphere.position.set(def.x, yPos, def.z);
                
                sphere.userData.level = i;
                sphere.userData.spineIndex = spineIndex;
                sphere.userData.initialOffset = new THREE.Vector3(def.x, 0, def.z); 
                
                scene.add(sphere);
                allControlSpheres.push(sphere);
                points.push(sphere.position);
            }

            const curve = new THREE.CatmullRomCurve3(points);
            curves.push(curve);

            const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
            const lineMat = new THREE.LineBasicMaterial({ color: def.color, linewidth: 2, transparent: true, opacity: 0.6 });
            const curveLine = new THREE.Line(lineGeo, lineMat);
            scene.add(curveLine);
            curveLines.push(curveLine);
        });

        // --- 3. [핵심] 상태 저장(Save) & 불러오기(Load) 함수 ---
        
        // 브라우저 URL 해시값에서 상태 불러오기
        function loadStateFromHash() {
            const hash = window.location.hash.substring(1); // '#' 기호 제거
            if (!hash) return; // 저장된 상태가 없으면 무시

            try {
                // Base64 디코딩 후 JSON 파싱
                const decodedStr = decodeURIComponent(atob(hash));
                const savedState = JSON.parse(decodedStr);

                if (savedState && savedState.length === segmentCount + 1) {
                    savedState.forEach((data, level) => {
                        const levelSpheres = allControlSpheres.filter(s => s.userData.level === level);
                        const centerSphere = levelSpheres.find(s => s.userData.spineIndex === 0);

                        // 1. 중심점 위치 복구
                        centerSphere.position.set(data.px, data.py, data.pz);
                        
                        // 2. 층별 회전(Quaternion) 복구
                        levelQuaternions[level].set(data.qx, data.qy, data.qz, data.qw);

                        // 3. 복구된 중심과 회전값을 바탕으로 모서리 4개 강제 정렬
                        levelSpheres.forEach(sphere => {
                            if (sphere !== centerSphere) {
                                const offset = sphere.userData.initialOffset.clone();
                                offset.applyQuaternion(levelQuaternions[level]);
                                sphere.position.copy(centerSphere.position).add(offset);
                            }
                        });
                    });
                    console.log("✅ 저장된 조형 상태를 성공적으로 불러왔습니다!");
                }
            } catch (error) {
                console.error("상태를 불러오는 중 오류가 발생했습니다. 잘못된 링크입니다.", error);
            }
        }

        // 페이지 로드 시 즉시 상태 복원 실행
        loadStateFromHash();

        // 현재 상태를 문자열로 만들어 URL에 붙이고 클립보드에 복사
        function saveStateToURL() {
            const state = [];
            // 0층부터 5층까지 중심점 좌표와 회전 데이터만 추출 (용량 최적화)
            for (let i = 0; i <= segmentCount; i++) {
                const centerSphere = allControlSpheres.find(s => s.userData.level === i && s.userData.spineIndex === 0);
                const q = levelQuaternions[i];
                state.push({
                    px: centerSphere.position.x, py: centerSphere.position.y, pz: centerSphere.position.z,
                    qx: q.x, qy: q.y, qz: q.z, qw: q.w
                });
            }

            // JSON 변환 후 Base64 인코딩하여 URL에 안전한 문자로 만듦
            const jsonStr = JSON.stringify(state);
            const encodedHash = btoa(encodeURIComponent(jsonStr));

            // URL 업데이트 (페이지 새로고침 없이 URL만 변경)
            window.location.hash = encodedHash;

            // 클립보드에 현재 브라우저 URL 복사
            navigator.clipboard.writeText(window.location.href).then(() => {
                showToast();
            }).catch(err => {
                alert("URL 복사에 실패했습니다. 주소창의 URL을 수동으로 복사해주세요.");
            });
        }

        // 토스트 알림 띄우기
        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- 4. 3D Transform Controls ---
        const transformControl = new THREE.TransformControls(camera, renderer.domElement);
        transformControl.setSize(0.7); 
        scene.add(transformControl);

        transformControl.addEventListener('dragging-changed', function (event) {
            orbitControls.enabled = !event.value;
        });

        // 강체 구속 로직 (기존과 동일)
        transformControl.addEventListener('objectChange', function () {
            const movedSphere = transformControl.object;
            const level = movedSphere.userData.level;
            const isCenter = movedSphere.userData.spineIndex === 0;

            const levelSpheres = allControlSpheres.filter(s => s.userData.level === level);
            const centerSphere = levelSpheres.find(s => s.userData.spineIndex === 0);

            if (isCenter) {
                const q = levelQuaternions[level];
                levelSpheres.forEach(sphere => {
                    if (sphere !== centerSphere) {
                        const offset = sphere.userData.initialOffset.clone();
                        offset.applyQuaternion(q); 
                        sphere.position.copy(centerSphere.position).add(offset); 
                    }
                });
            } else {
                const baseOffset = movedSphere.userData.initialOffset;
                const dragVector = new THREE.Vector3().subVectors(movedSphere.position, centerSphere.position);

                if (dragVector.lengthSq() > 0.001) {
                    const q = new THREE.Quaternion().setFromUnitVectors(
                        baseOffset.clone().normalize(), 
                        dragVector.clone().normalize()
                    );
                    levelQuaternions[level].copy(q);

                    levelSpheres.forEach(sphere => {
                        if (sphere !== centerSphere) {
                            const offset = sphere.userData.initialOffset.clone();
                            offset.applyQuaternion(q);
                            sphere.position.copy(centerSphere.position).add(offset);
                        }
                    });
                }
            }
        });

        // UI 이벤트 바인딩
        let currentMode = 'camera';
        const btnCamera = document.getElementById('btn-camera');
        const btnDeform = document.getElementById('btn-deform');
        const btnShare = document.getElementById('btn-share');
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (currentMode !== 'deform' || transformControl.dragging) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(allControlSpheres);
            if (intersects.length > 0) transformControl.attach(intersects[0].object);
            else transformControl.detach();
        });

        btnCamera.addEventListener('click', () => {
            currentMode = 'camera'; orbitControls.enabled = true; 
            transformControl.detach(); transformControl.enabled = false;
            btnCamera.classList.add('active-btn'); btnDeform.classList.remove('active-btn');
            material.wireframe = false;
        });

        btnDeform.addEventListener('click', () => {
            currentMode = 'deform'; orbitControls.enabled = true; 
            transformControl.enabled = true; 
            btnDeform.classList.add('active-btn'); btnCamera.classList.remove('active-btn');
            material.wireframe = true; 
        });

        // 공유 버튼 클릭 시 이벤트
        btnShare.addEventListener('click', saveStateToURL);

        // --- 5. 렌더링 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            if (currentMode === 'camera' || (currentMode === 'deform' && !transformControl.dragging)) {
                orbitControls.update();
            }
            
            for (let k = 0; k < 5; k++) {
                curveLines[k].geometry.setFromPoints(curves[k].getPoints(50));
            }

            for (let i = 0; i < posAttribute.count; i++) {
                const idx = i * 3;
                const origX = basePositions[idx];
                const origY = basePositions[idx + 1];
                const origZ = basePositions[idx + 2];

                const t = (origY + halfHeight) / ORIG_HEIGHT;

                let totalWeight = 0;
                let sumDispX = 0, sumDispY = 0, sumDispZ = 0;

                for (let k = 0; k < 5; k++) {
                    const base = spineDefs[k];
                    const curve = curves[k];

                    const distSq = Math.pow(origX - base.x, 2) + Math.pow(origZ - base.z, 2);
                    const weight = 1.0 / (Math.pow(distSq, 1.2) + 0.1); 

                    const curvePoint = curve.getPoint(t);
                    const dispX = curvePoint.x - base.x;
                    const dispY = curvePoint.y - origY; 
                    const dispZ = curvePoint.z - base.z;

                    sumDispX += dispX * weight;
                    sumDispY += dispY * weight;
                    sumDispZ += dispZ * weight;
                    totalWeight += weight;
                }

                posAttribute.setXYZ(i, 
                    origX + (sumDispX / totalWeight), 
                    origY + (sumDispY / totalWeight), 
                    origZ + (sumDispZ / totalWeight)
                );
            }
            
            posAttribute.needsUpdate = true;
            geometry.computeVertexNormals();

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
